<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Crypto Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div style="display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 30px;">
    <h1 style="margin:0;">🚀 Crypto Tracker</h1>
    <button id="theme-btn" style="padding: 8px 12px; border-radius: 8px; cursor: pointer; border: none;">
      ☀️ Light Mode
    </button>
  </div>

  <div id="crypto-container"></div>

  <div id="pagination" style="margin-top: 30px; text-align: center;">
    <button id="prev-btn">Prev</button>
    <span id="page-num" style="margin: 0 15px; font-weight: bold;">1</span>
    <button id="next-btn">Next</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
