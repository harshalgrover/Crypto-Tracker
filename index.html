<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Crypto Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">

  <div class="header">
    <h1>🚀 Crypto Tracker</h1>
    <div>
      <a href="favorites.html"><button>⭐ Favorites</button></a>
      <button id="theme-btn">🌙 Dark Mode</button>
    </div>
  </div>

  <div class="filters">
    <select id="filter">
      <option value="">Select Filter</option>
      <option value="cheap">Price < 100</option>
      <option value="expensive">Price > 1000</option>
      <option value="market">High Market Cap</option>
      <option value="gainers">Top Gainers</option>
      <option value="losers">Top Losers</option>
    </select>

    <select id="sort">
      <option value="">Sort By</option>
      <option value="price-high">Price High → Low</option>
      <option value="price-low">Price Low → High</option>
      <option value="market-high">Market Cap High → Low</option>
    </select>
  </div>

  <input type="text" id="search" placeholder="Search crypto...">

  <div id="crypto-container" class="cards"></div>

  <script src="script.js"></script>
</body>
</html>
